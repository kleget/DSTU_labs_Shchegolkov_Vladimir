<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<h:head>
    <title><ui:insert name="title">Автопрокат</ui:insert></title>
    <h:outputStylesheet library="css" name="styles.css"/>
</h:head>

<h:body>
    <header class="page-header">
        <div class="brand">
            <h:graphicImage library="images" name="logo.png" styleClass="logo" alt="Логотип"/>
            <div>
                <div class="company-name">RentAuto</div>
                <div class="company-subtitle">электронный сервис проката автомобилей</div>
            </div>
        </div>
        <div class="user-panel">
            <span>Пользователь: #{authBean.loggedIn ? authBean.currentUser.name : 'гость'}</span>
            <h:form rendered="#{authBean.loggedIn}">
                <h:commandButton value="Выйти" action="#{authBean.logout}" styleClass="link-button"/>
            </h:form>
        </div>
    </header>

    <nav class="main-nav">
        <h:link outcome="/welcome" value="Главная"/>
        <h:link outcome="/index" value="Авторизация" rendered="#{not authBean.loggedIn}"/>
        <h:link outcome="/register" value="Регистрация" rendered="#{not authBean.loggedIn}"/>
        <h:link outcome="/manager" value="Страница менеджера" rendered="#{authBean.manager}"/>
        <h:link outcome="/client" value="Страница клиента" rendered="#{authBean.client}"/>
    </nav>

    <main class="content">
        <ui:insert name="content"/>
    </main>

    <footer class="page-footer">
        <ui:insert name="footer">
            <span>Администрация RentAuto:</span>
            <span>+7 (863) 200-00-00</span>
            <span>support@rentauto.local</span>
        </ui:insert>
    </footer>
</h:body>
</html>
