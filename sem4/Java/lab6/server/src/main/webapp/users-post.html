<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавление пользователя</title>
    <link rel="stylesheet" href="resources/css/styles.css">
</head>
<body>
<main class="container">
    <nav class="top-nav"><a href="./">Главная</a><a href="users-get.html">GET-форма</a></nav>
    <h1>Добавление пользователя</h1>
    <section>
        <form method="POST" action="api/users" enctype="application/x-www-form-urlencoded">
            <label>Имя<input name="firstName" required></label>
            <label>Фамилия<input name="lastName" required></label>
            <label>E-mail<input type="email" name="email" required></label>
            <label>Пароль<input type="password" name="password" required></label>
            <button type="submit">Отправить POST</button>
        </form>
    </section>
</main>
</body>
</html>
